<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pengumuman Kelulusan</title>

  <link rel="stylesheet" href="style.css">
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>
<body>

  <div class="container">

    <div class="card">

      <div class="logo-wrapper">
        <img
          src="src/logo.jpg"
          class="logo"
        >
      </div>

      <h1>
        <span>PENGUMUMAN KELULUSAN</span><br>
        <span>SMPN SATAP 4 KINTAMANI</span>
      </h1>

      <h2>
        TAHUN AJARAN 2025/2026
      </h2>

      <div id="countdown" class="countdown">

        <div class="time-box">
          <span id="days">00</span>
          <small>Days</small>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span id="hours">00</span>
          <small>Hours</small>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span id="minutes">00</span>
          <small>Minutes</small>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span id="seconds">00</span>
          <small>Seconds</small>
        </div>

      </div>

      <p class="info">
        ( STATUS KELULUSAN DAPAT DI AKSES PADA
        02 JUNI 2026 JAM 10.00 WITA )
      </p>

      <div id="formBox" class="hidden">

        <input
          type="text"
          id="nisn"
          placeholder="Masukkan NISN"
        >

        <button onclick="cekKelulusan()">
          📢 CEK KELULUSAN
        </button>

      </div>

      <div id="result"></div>

      <div class="socials">

        <div class="socials">

  <a class="social facebook"
     href="https://facebook.com/share/1D3Mz5e6rB"
     target="_blank">

    <i class="fa-brands fa-facebook-f"></i>

  </a>

  <a class="social instagram"
     href="https://instagram.com/osis_smpn_satap_4_kintamani"
     target="_blank">

    <i class="fa-brands fa-instagram"></i>

  </a>

  <a class="social tiktok"
     href="https://tiktok.com/@osis_hebatspensafo"
     target="_blank">

    <i class="fa-brands fa-tiktok"></i>

  </a>

</div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
